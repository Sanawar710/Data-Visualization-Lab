<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam 2026 Analytics Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50; /* Dark blue-gray */
            color: #ecf0f1; /* Light gray */
            margin: 0;
            padding: 20px;
        }
        .dashboard-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #3498db; /* Teal accent */
            padding-bottom: 10px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: auto;
        }
        .chart-card {
            background-color: #34495e; /* Slightly lighter dark */
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .chart-card.full-width {
            grid-column: span 2;
        }
        h2 {
            font-size: 1.2rem;
            color: #3498db; /* Teal */
            margin-top: 0;
        }
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px;
            border-radius: 4px;
            pointer-events: none;
            font-size: 12px;
            visibility: hidden;
            z-index: 10;
        }
        .axis-label { font-size: 12px; fill: #ecf0f1; }
        .bar:hover { fill: #fff; transition: 0.2s; }
        .dot:hover { stroke: #fff; stroke-width: 2px; }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1>Steam Top Games 2026 - Performance Insights</h1>
        <p>Junior Developer: Data Visualization Lab 10</p>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <div class="container">
        <!-- Chart 1: Bar Chart -->
        <div class="chart-card">
            <h2>Recommendations by Genre</h2>
            <div id="bar-chart"></div>
        </div>

        <!-- Chart 2: Scatter Plot -->
        <div class="chart-card">
            <h2>Metacritic Score vs. Price</h2>
            <div id="scatter-plot"></div>
        </div>

        <!-- Chart 3: Line Chart -->
        <div class="chart-card full-width">
            <h2>Peak Concurrent Users Over Time</h2>
            <div id="line-chart"></div>
        </div>
    </div>

    <script>
        // Load the dataset
        d3.csv("steam_top_games_2026.csv").then(data => {
            
            // 1. DATA PREPROCESSING
            data.forEach(d => {
                d.Recommendations = +d.recommendations || 0;
                d.Price = +d.price_usd || 0;
                d.Rating = +d.metacritic_score || 0;
                d.PeakCCU = +d.peak_ccu || 0;
                // Parse date: format like "May 17, 2022"
                d.Date = d3.timeParse("%b %d, %Y")(d.release_date);
                // Genre: take first genre
                d.Genre = d.genres ? d.genres.split(',')[0].trim() : 'Unknown';
                d.Game = d.name;
            });

            const margin = {top: 30, right: 30, bottom: 50, left: 60},
                  width = 500 - margin.left - margin.right,
                  height = 300 - margin.top - margin.bottom;

            const tooltip = d3.select("#tooltip");

            // --- CHART 1: BAR CHART (Recommendations by Genre) ---
            const genreData = d3.rollups(data, v => d3.sum(v, d => d.Recommendations), d => d.Genre);
            
            const svgBar = d3.select("#bar-chart")
                .append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            const xBar = d3.scaleBand()
                .range([0, width])
                .domain(genreData.map(d => d[0]))
                .padding(0.2);

            const yBar = d3.scaleLinear()
                .domain([0, d3.max(genreData, d => d[1])])
                .range([height, 0]);

            svgBar.append("g")
                .attr("transform", `translate(0,${height})`)
                .call(d3.axisBottom(xBar))
                .selectAll("text")
                .attr("transform", "translate(-10,0)rotate(-45)")
                .style("text-anchor", "end");

            svgBar.append("g").call(d3.axisLeft(yBar));

            svgBar.selectAll("rect")
                .data(genreData)
                .enter()
                .append("rect")
                .attr("x", d => xBar(d[0]))
                .attr("y", d => yBar(d[1]))
                .attr("width", xBar.bandwidth())
                .attr("height", d => height - yBar(d[1]))
                .attr("fill", "#e74c3c")  // Red
                .on("mouseover", (event, d) => {
                    tooltip.style("visibility", "visible").html(`Genre: ${d[0]}<br>Recommendations: ${d[1].toLocaleString()}`);
                })
                .on("mousemove", (event) => {
                    tooltip.style("top", (event.pageY - 10) + "px").style("left", (event.pageX + 10) + "px");
                })
                .on("mouseout", () => tooltip.style("visibility", "hidden"));


            // --- CHART 2: SCATTER PLOT (Rating vs Price) ---
            const svgScatter = d3.select("#scatter-plot")
                .append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            const xScatter = d3.scaleLinear().domain([0, d3.max(data, d => d.Price)]).range([0, width]);
            const yScatter = d3.scaleLinear().domain([0, 100]).range([height, 0]);

            svgScatter.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(xScatter));
            svgScatter.append("g").call(d3.axisLeft(yScatter));

            svgScatter.selectAll("circle")
                .data(data)
                .enter()
                .append("circle")
                .attr("cx", d => xScatter(d.Price))
                .attr("cy", d => yScatter(d.Rating))
                .attr("r", 6)
                .style("fill", "#f39c12")  // Orange
                .style("opacity", 0.7)
                .attr("class", "dot")
                .on("mouseover", (event, d) => {
                    tooltip.style("visibility", "visible").html(`Game: ${d.Game}<br>Metacritic: ${d.Rating}<br>Price: $${d.Price}`);
                })
                .on("mousemove", (event) => {
                    tooltip.style("top", (event.pageY - 10) + "px").style("left", (event.pageX + 10) + "px");
                })
                .on("mouseout", () => tooltip.style("visibility", "hidden"));


            // --- CHART 3: LINE CHART (Peak CCU over Time) ---
            const fullWidth = 1100 - margin.left - margin.right;
            const svgLine = d3.select("#line-chart")
                .append("svg")
                .attr("width", fullWidth + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            const xLine = d3.scaleTime()
                .domain(d3.extent(data, d => d.Date))
                .range([0, fullWidth]);

            const yLine = d3.scaleLinear()
                .domain([0, d3.max(data, d => d.PeakCCU)])
                .range([height, 0]);

            svgLine.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(xLine));
            svgLine.append("g").call(d3.axisLeft(yLine));

            const line = d3.line()
                .x(d => xLine(d.Date))
                .y(d => yLine(d.PeakCCU))
                .curve(d3.curveMonotoneX);

            svgLine.append("path")
                .datum(data.sort((a,b) => a.Date - b.Date))
                .attr("fill", "none")
                .attr("stroke", "#9b59b6")  // Purple
                .attr("stroke-width", 3)
                .attr("d", line);

        }).catch(error => {
            console.error("Error loading CSV:", error);
        });
    </script>
</body>
</html>
