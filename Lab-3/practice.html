<!DOCTYPE html> <!--  “This is an HTML5 document. ” -->
<html> <!--  root element of the page -->

<head>
    <meta charset="UTF-8"> <!-- Sets the character encoding for the document to UTF-8. -->
    <title>My First D3 Chart</title> <!--tab name in the browser.-->

    <!-- Load D3 -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

    <h2>My very First D3 Visualization</h2>

    <script>

        const data = [30, 80, 45, 60, 20];

        const svg = d3.select("body")
            .append("svg")
            .attr("width", 500)
            .attr("height", 200);

        svg.selectAll("rect")
            .data(data)
            .join("rect")
            .attr("x", (d, i) => i * 100)
            .attr("y", d => 200 - d)
            .attr("width", 50)
            .attr("height", d => d)
            .attr("fill", "orange");


    </script>

</body>

</html>
